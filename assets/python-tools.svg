<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">

  <defs>
    <linearGradient id="motorGradPT" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="mcpGradPT" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <radialGradient id="motorGlowPT" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#8b5cf6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.04"/>
    </radialGradient>
    <filter id="softShadowPT" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowPT" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowPTPick" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0891b2"/>
    </marker>
  </defs>

  <!-- ============================================================ -->
  <!-- LEFT — Your Python code (3 @tool functions)                   -->
  <!-- ============================================================ -->
  <g transform="translate(30, 90)">
    <text x="0" y="-12" font-size="10" font-weight="700" fill="#64748b" letter-spacing="2">YOUR CODE</text>

    <rect x="0" y="0" width="200" height="56" rx="10"
          fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#softShadowPT)"/>
    <text x="12" y="20" font-size="10" fill="#8b5cf6" font-weight="700">@tool</text>
    <text x="12" y="36" font-size="10" fill="#0f172a">async def</text>
    <text x="65" y="36" font-size="10" font-weight="700" fill="#0f172a">fetch_customer</text>
    <text x="12" y="50" font-size="9" fill="#64748b">(args: CustomerLookup) → Customer</text>

    <rect x="0" y="76" width="200" height="56" rx="10"
          fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#softShadowPT)"/>
    <text x="12" y="96" font-size="10" fill="#8b5cf6" font-weight="700">@tool</text>
    <text x="12" y="112" font-size="10" fill="#0f172a">async def</text>
    <text x="65" y="112" font-size="10" font-weight="700" fill="#0f172a">save_briefing</text>
    <text x="12" y="126" font-size="9" fill="#64748b">(args, ctx: ToolContext) → str</text>

    <rect x="0" y="152" width="200" height="56" rx="10"
          fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#softShadowPT)"/>
    <text x="12" y="172" font-size="10" fill="#8b5cf6" font-weight="700">@tool</text>
    <text x="12" y="188" font-size="10" fill="#0f172a">def</text>
    <text x="40" y="188" font-size="10" font-weight="700" fill="#0f172a">hash_payload</text>
    <text x="12" y="202" font-size="9" fill="#64748b">(args: HashInput) → HashOutput</text>

    <text x="0" y="232" font-size="9" fill="#64748b" font-style="italic">Pydantic in. Pydantic out.</text>
  </g>

  <!-- arrow code → motor -->
  <path d="M 240 190 L 290 220" stroke="#94a3b8" stroke-width="1.5"
        fill="none" marker-end="url(#arrowPT)"/>
  <text x="240" y="180" font-size="9" fill="#64748b">pass to</text>
  <text x="240" y="194" font-size="9" font-weight="700" fill="#8b5cf6">default_tools=[...]</text>

  <!-- ============================================================ -->
  <!-- CENTER — MOTOR collects + compiles                             -->
  <!-- ============================================================ -->
  <g transform="translate(295, 165)">
    <ellipse cx="80" cy="60" rx="100" ry="80" fill="url(#motorGlowPT)"/>
    <rect x="0" y="0" width="160" height="120" rx="14"
          fill="url(#motorGradPT)" filter="url(#softShadowPT)"/>
    <text x="80" y="28" font-size="12" font-weight="700"
          fill="#ffffff" text-anchor="middle" letter-spacing="1.5">MOTOR</text>
    <text x="80" y="44" font-size="9" fill="#ffffff" fill-opacity="0.85"
          text-anchor="middle" letter-spacing="1">single instance</text>

    <rect x="14" y="58" width="132" height="54" rx="8"
          fill="#ffffff" fill-opacity="0.94"/>
    <text x="26" y="76" font-size="9" fill="#475569">• split + dedupe</text>
    <text x="26" y="90" font-size="9" fill="#475569">• schema from Pydantic</text>
    <text x="26" y="104" font-size="9" fill="#475569">• validate at run ctor</text>
  </g>

  <!-- arrow motor → mcp -->
  <path d="M 460 225 L 510 225" stroke="#94a3b8" stroke-width="1.5"
        fill="none" marker-end="url(#arrowPT)"/>
  <text x="464" y="217" font-size="9" fill="#64748b">mounts</text>

  <!-- ============================================================ -->
  <!-- RIGHT-CENTER — In-process MCP server                           -->
  <!-- ============================================================ -->
  <g transform="translate(515, 130)">
    <rect x="-6" y="-6" width="200" height="200" rx="16"
          fill="none" stroke="#0891b2" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
    <rect x="0" y="0" width="188" height="32" rx="8"
          fill="url(#mcpGradPT)" filter="url(#softShadowPT)"/>
    <text x="94" y="20" font-size="11" font-weight="700" fill="#ffffff"
          text-anchor="middle" letter-spacing="1">in-process MCP · sophia</text>

    <rect x="0" y="40" width="188" height="48" rx="8"
          fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="14" y="58" font-size="10" font-weight="600" fill="#0f172a">mcp__sophia__fetch_customer</text>
    <text x="14" y="76" font-size="9" fill="#64748b">dispatcher · audit · event</text>

    <rect x="0" y="96" width="188" height="48" rx="8"
          fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="14" y="114" font-size="10" font-weight="600" fill="#0f172a">mcp__sophia__save_briefing</text>
    <text x="14" y="132" font-size="9" fill="#64748b">dispatcher · audit · event</text>

    <rect x="0" y="152" width="188" height="36" rx="8"
          fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="14" y="172" font-size="10" font-weight="600" fill="#0f172a">mcp__sophia__hash_payload</text>
  </g>

  <!-- arrow mcp → model -->
  <path d="M 710 225 L 760 225" stroke="#0891b2" stroke-width="1.5"
        fill="none" marker-end="url(#arrowPTPick)"/>
  <text x="715" y="217" font-size="9" fill="#0891b2" font-weight="600">picks</text>

  <!-- ============================================================ -->
  <!-- RIGHT — Model invokes a tool live                              -->
  <!-- ============================================================ -->
  <g transform="translate(763, 165)" filter="url(#softShadowPT)">
    <rect x="0" y="0" width="100" height="120" rx="14"
          fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
    <text x="50" y="26" font-size="11" font-weight="700"
          fill="#0f172a" text-anchor="middle">MODEL</text>
    <text x="50" y="42" font-size="9" fill="#64748b" text-anchor="middle">tool_use</text>

    <rect x="8" y="54" width="84" height="58" rx="8"
          fill="#f0f9ff" stroke="#bae6fd" stroke-width="1"/>
    <text x="50" y="72" font-size="9" font-weight="700" fill="#0891b2"
          text-anchor="middle">fetch_customer</text>
    <text x="50" y="86" font-size="8" fill="#475569" text-anchor="middle">{customer_id:</text>
    <text x="50" y="98" font-size="8" fill="#475569" text-anchor="middle">"ACME-001"}</text>
    <text x="50" y="108" font-size="7" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">live</text>
  </g>

  <!-- ============================================================ -->
  <!-- BOTTOM — audit + event side effects                            -->
  <!-- ============================================================ -->
  <g transform="translate(295, 320)">
    <rect x="0" y="0" width="160" height="60" rx="10"
          fill="#fef3c7" stroke="#fcd34d" stroke-width="1" opacity="0.85"/>
    <text x="80" y="22" font-size="9" fill="#78350f" text-anchor="middle" font-weight="700" letter-spacing="1">PER-CALL SIDE EFFECTS</text>
    <text x="80" y="40" font-size="9" fill="#78350f" text-anchor="middle">&lt;run&gt;/audit/tool_*.json</text>
    <text x="80" y="54" font-size="9" fill="#78350f" text-anchor="middle">Event(python_tool_call)</text>
  </g>

  <!-- thin dotted line motor → side effects -->
  <path d="M 375 285 L 375 320" stroke="#fbbf24" stroke-width="1"
        fill="none" stroke-dasharray="2,3"/>

  <!-- ============================================================ -->
  <!-- TITLE BAND                                                     -->
  <!-- ============================================================ -->
  <text x="440" y="32" font-size="14" font-weight="700" fill="#0f172a"
        text-anchor="middle" letter-spacing="0.5">Python @tool functions become live tools the agent picks from</text>
  <text x="440" y="50" font-size="10" fill="#64748b" text-anchor="middle"
        letter-spacing="0.5">decorate · pass · invoke — no mcp_servers wiring, no allowed_tools list to keep in sync</text>

  <!-- ============================================================ -->
  <!-- BOTTOM BAND                                                    -->
  <!-- ============================================================ -->
  <text x="440" y="438" font-size="10" font-weight="600" fill="#8b5cf6"
        text-anchor="middle" letter-spacing="2">SAME LIST · MotorConfig · RunTask · AgentDefinition</text>

</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 280" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bigGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="smallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- LEFT: SDK default — fat bar -->
  <g transform="translate(110, 30)">
    <text x="110" y="0" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">
      Claude Agent SDK · default
    </text>
    <rect x="0" y="20" width="220" height="180" rx="12" fill="url(#bigGrad)" filter="url(#soft)" opacity="0.95"/>
    <text x="110" y="105" text-anchor="middle" font-size="42" font-weight="800" fill="white">$0.0498</text>
    <text x="110" y="130" text-anchor="middle" font-size="14" fill="white" opacity="0.9">per minimal call</text>
    <text x="110" y="160" text-anchor="middle" font-size="13" fill="white" opacity="0.85">~7,500 cache-creation tokens</text>
    <text x="110" y="180" text-anchor="middle" font-size="13" fill="white" opacity="0.85">10 tools · 12 bundled skills</text>
  </g>

  <!-- CENTER: savings call-out -->
  <g transform="translate(440, 145)">
    <text x="0" y="0" text-anchor="middle" font-size="56" font-weight="800" fill="#16a34a">−94%</text>
    <text x="0" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#16a34a" letter-spacing="0.6">cost</text>
  </g>

  <!-- RIGHT: sophia-motor — sliver -->
  <g transform="translate(550, 30)">
    <text x="110" y="0" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">
      sophia-motor · Motor()
    </text>
    <rect x="0" y="180" width="220" height="20" rx="6" fill="url(#smallGrad)" filter="url(#soft)" opacity="0.98"/>
    <text x="110" y="170" text-anchor="middle" font-size="22" font-weight="800" fill="#0e7490">$0.0030</text>
    <text x="110" y="225" text-anchor="middle" font-size="13" fill="#334155">prompt + answer · nothing else</text>
  </g>

  <!-- Footer: tiny meta -->
  <text x="440" y="265" text-anchor="middle" font-size="12" fill="#94a3b8">
    same model · same provider · same prompt — only the SDK overhead differs
  </text>
</svg>

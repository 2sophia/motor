<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bigGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="smallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">
    Same minimal task — what you actually pay
  </text>
  <text x="440" y="62" text-anchor="middle" font-size="13" fill="#64748b">
    "Explain what makes a good API design" · 1 turn · no tools needed
  </text>

  <!-- Left bar: SDK default -->
  <g transform="translate(170, 100)">
    <text x="80" y="-12" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">
      Claude Agent SDK (default)
    </text>
    <rect x="0" y="0" width="160" height="170" rx="10" fill="url(#bigGrad)" filter="url(#soft)" opacity="0.95"/>
    <text x="80" y="80" text-anchor="middle" font-size="34" font-weight="800" fill="white">$0.0498</text>
    <text x="80" y="105" text-anchor="middle" font-size="12" fill="white" opacity="0.9">per call</text>
    <text x="80" y="135" text-anchor="middle" font-size="11" fill="white" opacity="0.85">~7,500 cache-creation tokens</text>
    <text x="80" y="151" text-anchor="middle" font-size="11" fill="white" opacity="0.85">10 tools · 12 bundled skills</text>

    <!-- "what's inside" callouts -->
    <g transform="translate(0, 200)" font-size="11" fill="#475569">
      <text x="0" y="0">▸ all built-in tools loaded (Bash, WebFetch, ...)</text>
      <text x="0" y="18">▸ bundled skills catalogue (update-config, simplify, ...)</text>
      <text x="0" y="36">▸ SDK billing-header + identity system blocks</text>
      <text x="0" y="54">▸ date / "tools haven't been used" reminders</text>
    </g>
  </g>

  <!-- Center divider with savings call-out -->
  <g transform="translate(440, 180)">
    <text x="0" y="0" text-anchor="middle" font-size="46" font-weight="800" fill="#16a34a">−94%</text>
    <text x="0" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a" letter-spacing="0.5">cost</text>
    <text x="0" y="60" text-anchor="middle" font-size="11" fill="#64748b">pay only for the prompt</text>
    <text x="0" y="76" text-anchor="middle" font-size="11" fill="#64748b">and the answer.</text>
  </g>

  <!-- Right bar: sophia-motor -->
  <g transform="translate(550, 245)">
    <text x="80" y="-12" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">
      sophia-motor (Motor() default)
    </text>
    <rect x="0" y="0" width="160" height="25" rx="6" fill="url(#smallGrad)" filter="url(#soft)" opacity="0.98"/>
    <text x="80" y="18" text-anchor="middle" font-size="14" font-weight="700" fill="white">$0.0030</text>
    <g transform="translate(0, 50)" font-size="11" fill="#475569">
      <text x="0" y="0">▸ zero tools (opt in explicitly)</text>
      <text x="0" y="18">▸ zero skills (no bundled catalogue)</text>
      <text x="0" y="36">▸ SDK noise stripped at proxy</text>
      <text x="0" y="54">▸ only your prompt + your answer</text>
    </g>
  </g>

  <!-- Footer note -->
  <text x="440" y="345" text-anchor="middle" font-size="11" fill="#94a3b8">
    Measured 2026-05-01 · claude-opus-4-6 · same prompt, same model, same provider · live runs
  </text>
</svg>

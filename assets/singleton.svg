<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">

  <defs>
    <linearGradient id="motorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="motorGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#8b5cf6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.04"/>
    </radialGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- ============================================================ -->
  <!-- Motor singleton (left, big, magic)                             -->
  <!-- ============================================================ -->
  <g transform="translate(40, 90)">
    <ellipse cx="120" cy="100" rx="160" ry="130" fill="url(#motorGlow)"/>
    <rect x="0" y="0" width="240" height="200" rx="20"
          fill="url(#motorGrad)" filter="url(#softShadow)"/>

    <text x="120" y="40" font-size="14" font-weight="700"
          fill="#ffffff" text-anchor="middle" letter-spacing="1.5">MOTOR</text>
    <text x="120" y="58" font-size="10" fill="#ffffff" fill-opacity="0.85"
          text-anchor="middle" letter-spacing="1">instanced once</text>

    <!-- inner panel -->
    <rect x="20" y="78" width="200" height="105" rx="10"
          fill="#ffffff" fill-opacity="0.92"/>

    <text x="36" y="100" font-size="11" fill="#475569">• proxy + audit</text>
    <text x="36" y="120" font-size="11" fill="#475569">• default system</text>
    <text x="36" y="140" font-size="11" fill="#475569">• default tools / skills</text>
    <text x="36" y="160" font-size="11" fill="#475569">• default schema</text>

    <text x="120" y="178" font-size="10" font-weight="600" fill="#0891b2"
          text-anchor="middle" letter-spacing="1">SHARED · LAZY · SAFE</text>
  </g>
  <text x="160" y="320" font-size="11" font-weight="600" fill="#64748b"
        text-anchor="middle" letter-spacing="2">SINGLETON</text>

  <!-- ============================================================ -->
  <!-- 3 smart functions (right column)                               -->
  <!-- ============================================================ -->

  <!-- function 1: assess_loan -->
  <g transform="translate(450, 30)" filter="url(#softShadow)">
    <rect x="0" y="0" width="370" height="80" rx="10"
          fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="20" y="32" font-size="13" font-weight="700" fill="#0f172a">async def assess_loan(...)</text>
    <text x="20" y="55" font-size="11" fill="#64748b">→ </text>
    <text x="36" y="55" font-size="12" fill="#0891b2" font-weight="600">Decision</text>
    <text x="100" y="55" font-size="11" fill="#94a3b8">(verdict · reasoning · confidence)</text>
    <text x="20" y="71" font-size="10" fill="#94a3b8" font-style="italic">multi-turn · reads policy.md</text>
  </g>

  <!-- function 2: classify_doc -->
  <g transform="translate(450, 130)" filter="url(#softShadow)">
    <rect x="0" y="0" width="370" height="80" rx="10"
          fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="20" y="32" font-size="13" font-weight="700" fill="#0f172a">async def classify_doc(...)</text>
    <text x="20" y="55" font-size="11" fill="#64748b">→ </text>
    <text x="36" y="55" font-size="12" fill="#0891b2" font-weight="600">Category</text>
    <text x="106" y="55" font-size="11" fill="#94a3b8">(label · subcategory · score)</text>
    <text x="20" y="71" font-size="10" fill="#94a3b8" font-style="italic">single-turn · pure reasoning</text>
  </g>

  <!-- function 3: summarize_call -->
  <g transform="translate(450, 230)" filter="url(#softShadow)">
    <rect x="0" y="0" width="370" height="80" rx="10"
          fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="20" y="32" font-size="13" font-weight="700" fill="#0f172a">async def summarize_call(...)</text>
    <text x="20" y="55" font-size="11" fill="#64748b">→ </text>
    <text x="36" y="55" font-size="12" fill="#0891b2" font-weight="600">Summary</text>
    <text x="103" y="55" font-size="11" fill="#94a3b8">(topic · action_items · sentiment)</text>
    <text x="20" y="71" font-size="10" fill="#94a3b8" font-style="italic">multi-turn · uses recap skill</text>
  </g>

  <!-- ============================================================ -->
  <!-- Connection lines (motor → functions)                           -->
  <!-- ============================================================ -->
  <!-- center of motor box: x=160 (40+120), y=190 (90+100) -->
  <!-- targets: y=70, y=170, y=270 (function center height) -->

  <path d="M 280 175 Q 360 115, 450 70" stroke="#94a3b8" stroke-width="1.5"
        fill="none" stroke-dasharray="3,3"/>
  <path d="M 280 190 Q 360 180, 450 170" stroke="#94a3b8" stroke-width="1.5"
        fill="none" stroke-dasharray="3,3"/>
  <path d="M 280 205 Q 360 245, 450 270" stroke="#94a3b8" stroke-width="1.5"
        fill="none" stroke-dasharray="3,3"/>

  <text x="635" y="320" font-size="11" font-weight="600" fill="#64748b"
        text-anchor="middle" letter-spacing="2">N SMART FUNCTIONS · ONE MOTOR</text>

</svg>
